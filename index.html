<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    
    <!-- PrismJS for Beautiful Code Highlighting (CSS) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <!-- Custom Styles -->
    <style>
        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col selection:bg-blue-200 selection:text-blue-900">

    <!-- Glassmorphism Header -->
    <header class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-slate-200 transition-colors duration-300" id="site-header">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-slate-900 truncate tracking-tight" id="site-title">Loading...</h1>
            <div id="loading-spinner" class="animate-spin rounded-full h-5 w-5 border-b-2 border-slate-900"></div>
        </div>
    </header>

    <!-- Main Content Container (The "Paper") -->
    <main class="max-w-4xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow flex flex-col">
        <div id="content-container" class="bg-white rounded-2xl shadow-xl shadow-slate-200/50 ring-1 ring-slate-100 p-6 sm:p-10 space-y-6 flex-grow transition-all duration-300">
            <!-- JSON Blocks will be injected here -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-8 text-center">
        <p class="text-sm font-medium text-slate-400">Powered by <span class="text-slate-600">Paper.json</span></p>
    </footer>

    <!-- PrismJS for Code Highlighting (JS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>

    <script>
        // ==========================================
        // 1. ROUTING & FILE DISCOVERY
        // ==========================================
        function getJsonFilename() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('page')) return `${urlParams.get('page')}.json`;

            if (window.location.hash && window.location.hash.length > 1) {
                return `${window.location.hash.substring(1)}.json`;
            }

            const path = window.location.pathname;
            const cleanPath = path.replace(/\/$/, '').replace(/\/(index|404)\.html$/, '');
            const segments = cleanPath.split('/').filter(Boolean);

            if (window.location.hostname.includes('github.io') && segments.length > 1) {
                return `${segments[segments.length - 1]}.json`;
            } else if (!window.location.hostname.includes('github.io') && segments.length > 0) {
                return `${segments[segments.length - 1]}.json`;
            }

            return 'data.json';
        }

        // ==========================================
        // 2. DOM UTILITIES
        // ==========================================
        function createElement(tag, className, textContent = null) {
            const el = document.createElement(tag);
            if (className) el.className = className;
            if (textContent) el.textContent = textContent;
            return el;
        }

        // ==========================================
        // 3. THE RENDERER
        // ==========================================
        function renderPage(data) {
            const container = document.getElementById('content-container');
            const spinner = document.getElementById('loading-spinner');
            
            // Handle Page Meta
            if (data.pageMeta) {
                if (data.pageMeta.title) {
                    document.title = data.pageMeta.title;
                    document.getElementById('site-title').textContent = data.pageMeta.title;
                }
                if (data.pageMeta.themeColor) {
                    document.getElementById('site-header').style.borderTop = `4px solid ${data.pageMeta.themeColor}`;
                }
            }

            // Process Blocks
            if (data.blocks && Array.isArray(data.blocks)) {
                data.blocks.forEach((block, index) => {
                    let el = null;
                    
                    switch (block.type) {
                        case 'header':
                            const hClasses = {
                                1: 'text-3xl sm:text-4xl font-extrabold text-slate-900 mt-6 mb-4 tracking-tight',
                                2: 'text-2xl sm:text-3xl font-bold text-slate-800 mt-8 mb-4 pb-2 border-b border-slate-100',
                                3: 'text-xl sm:text-2xl font-semibold text-slate-800 mt-6 mb-3'
                            };
                            el = createElement(block.level === 1 ? 'h1' : block.level === 2 ? 'h2' : 'h3', hClasses[block.level] || hClasses[2], block.text);
                            break;

                        case 'text':
                            el = createElement('p', 'text-base sm:text-lg text-slate-600 leading-relaxed mb-4', block.text);
                            break;

                        case 'image':
                            el = createElement('figure', 'my-8 group');
                            const imgContainer = createElement('div', 'rounded-2xl overflow-hidden ring-1 ring-slate-900/5 shadow-md bg-slate-100');
                            const img = document.createElement('img');
                            img.className = 'w-full h-auto object-cover max-h-[600px] group-hover:scale-[1.02] transition-transform duration-500 ease-out';
                            img.src = block.url;
                            img.alt = block.alt || 'Image';
                            img.onerror = () => { img.src = 'https://via.placeholder.com/800x400?text=Image+Not+Found'; };
                            imgContainer.appendChild(img);
                            el.appendChild(imgContainer);
                            if (block.caption) el.appendChild(createElement('figcaption', 'text-sm text-center text-slate-500 mt-3 font-medium text-balance', block.caption));
                            break;

                        case 'link':
                            el = document.createElement('a');
                            if (block.style === 'button') {
                                el.className = 'inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-xl shadow-sm text-white bg-slate-900 hover:bg-slate-800 transition-all active:scale-95 w-full sm:w-auto text-center my-2';
                            } else {
                                el.className = 'text-blue-600 hover:text-blue-700 font-medium underline decoration-blue-600/30 hover:decoration-blue-600 underline-offset-4 transition-all';
                            }
                            el.textContent = block.text;
                            el.href = block.url;
                            if (block.openInNewTab) el.target = '_blank';
                            break;

                        case 'code':
                            el = createElement('div', 'rounded-xl overflow-hidden shadow-lg my-8 bg-[#1e1e1e] ring-1 ring-slate-900/10');
                            
                            // Mac-style window header
                            const topBar = createElement('div', 'flex items-center px-4 py-3 bg-[#2d2d2d] border-b border-white/10');
                            const dots = createElement('div', 'flex space-x-2 mr-4');
                            ['bg-red-500', 'bg-yellow-500', 'bg-green-500'].forEach(color => {
                                const dot = createElement('div', `w-3 h-3 rounded-full ${color}`);
                                dots.appendChild(dot);
                            });
                            topBar.appendChild(dots);
                            topBar.appendChild(createElement('span', 'text-xs text-slate-400 font-mono tracking-wider ml-auto', block.language));
                            el.appendChild(topBar);

                            // Code content
                            const pre = createElement('pre', `language-${block.language} p-4 overflow-x-auto text-sm sm:text-base leading-snug`);
                            const code = createElement('code', `language-${block.language}`);
                            code.textContent = block.content;
                            pre.appendChild(code);
                            el.appendChild(pre);
                            break;

                        case 'table':
                            el = createElement('div', 'overflow-x-auto no-scrollbar rounded-xl shadow-sm ring-1 ring-slate-200 my-8');
                            const table = createElement('table', 'min-w-full divide-y divide-slate-200');
                            
                            // Headers
                            const thead = createElement('thead', 'bg-slate-50');
                            const headerRow = document.createElement('tr');
                            block.headers.forEach(hText => headerRow.appendChild(createElement('th', 'px-6 py-4 text-left text-xs font-bold text-slate-700 uppercase tracking-wider', hText)));
                            thead.appendChild(headerRow);
                            table.appendChild(thead);

                            // Rows
                            const tbody = createElement('tbody', 'bg-white divide-y divide-slate-100');
                            block.rows.forEach(row => {
                                const tr = createElement('tr', 'hover:bg-slate-50/70 transition-colors');
                                row.forEach(cData => tr.appendChild(createElement('td', 'px-6 py-4 whitespace-nowrap text-sm text-slate-700 font-medium', cData)));
                                tbody.appendChild(tr);
                            });
                            table.appendChild(tbody);
                            el.appendChild(table);
                            break;
                    }

                    if (el) {
                        el.classList.add('fade-in');
                        el.style.animationDelay = `${index * 0.06}s`;
                        container.appendChild(el);
                    }
                });
            }

            if (window.Prism) Prism.highlightAll();
            spinner.style.display = 'none';
        }

        function renderError(filename) {
            const container = document.getElementById('content-container');
            document.getElementById('site-title').textContent = "Error";
            container.innerHTML = `
                <div class="text-center py-16 fade-in flex flex-col items-center justify-center">
                    <div class="bg-red-50 text-red-500 rounded-full p-4 mb-4">
                        <svg class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </div>
                    <h2 class="text-2xl font-bold text-slate-900 mb-2">Content Not Found</h2>
                    <p class="text-slate-500 mb-6">Attempted to fetch: <code class="bg-slate-100 px-2 py-1 rounded text-red-600 font-mono text-sm">${filename}</code></p>
                    <p class="text-sm text-slate-400 max-w-md mx-auto text-balance">If you are opening this locally (file://), the fetch request will fail due to browser security policies. You must run a local server or host on GitHub Pages.</p>
                </div>
            `;
            document.getElementById('loading-spinner').style.display = 'none';
        }

        // ==========================================
        // 4. INITIALIZATION
        // ==========================================
        async function init() {
            const targetFile = getJsonFilename();
            try {
                const response = await fetch(targetFile);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                renderPage(data);
            } catch (error) {
                console.error("Fetch failed:", error);
                renderError(targetFile);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
