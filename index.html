<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PrismJS for Beautiful Code Highlighting (CSS) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    
    <!-- Custom Styles -->
    <style>
        .fade-in { animation: fadeIn 0.4s ease-in forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Header area -->
    <header class="bg-white shadow-sm sticky top-0 z-10 transition-colors duration-300" id="site-header">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-900 truncate" id="site-title">Loading...</h1>
            <div id="loading-spinner" class="animate-spin rounded-full h-5 w-5 border-b-2 border-gray-900"></div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main id="content-container" class="max-w-4xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-6 pb-20 flex-grow">
        <!-- JSON Blocks will be injected here -->
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-4xl mx-auto px-4 py-6 text-center text-sm text-gray-500">
            Powered by Paper.json
        </div>
    </footer>

    <!-- PrismJS for Code Highlighting (JS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

    <script>
        // ==========================================
        // 1. ROUTING & FILE DISCOVERY
        // ==========================================
        function getJsonFilename() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('page')) return `${urlParams.get('page')}.json`;

            if (window.location.hash && window.location.hash.length > 1) {
                return `${window.location.hash.substring(1)}.json`;
            }

            const path = window.location.pathname;
            const cleanPath = path.replace(/\/$/, '').replace(/\/(index|404)\.html$/, '');
            const segments = cleanPath.split('/').filter(Boolean);

            if (window.location.hostname.includes('github.io') && segments.length > 1) {
                return `${segments[segments.length - 1]}.json`;
            } else if (!window.location.hostname.includes('github.io') && segments.length > 0) {
                return `${segments[segments.length - 1]}.json`;
            }

            return 'data.json';
        }

        // ==========================================
        // 2. DOM UTILITIES
        // ==========================================
        function createElement(tag, className, textContent = null) {
            const el = document.createElement(tag);
            if (className) el.className = className;
            if (textContent) el.textContent = textContent;
            return el;
        }

        // ==========================================
        // 3. THE RENDERER
        // ==========================================
        function renderPage(data) {
            const container = document.getElementById('content-container');
            const spinner = document.getElementById('loading-spinner');
            
            if (data.pageMeta) {
                if (data.pageMeta.title) {
                    document.title = data.pageMeta.title;
                    document.getElementById('site-title').textContent = data.pageMeta.title;
                }
                if (data.pageMeta.themeColor) {
                    document.getElementById('site-header').style.borderBottom = `3px solid ${data.pageMeta.themeColor}`;
                }
            }

            if (data.blocks && Array.isArray(data.blocks)) {
                data.blocks.forEach((block, index) => {
                    let el = null;
                    
                    switch (block.type) {
                        case 'header':
                            const hClasses = {
                                1: 'text-3xl sm:text-4xl font-extrabold text-gray-900 mt-8 mb-4 tracking-tight',
                                2: 'text-2xl sm:text-3xl font-bold text-gray-800 mt-8 mb-4 border-b pb-2',
                                3: 'text-xl font-bold text-gray-800 mt-6 mb-3'
                            };
                            el = createElement(block.level === 1 ? 'h1' : block.level === 2 ? 'h2' : 'h3', hClasses[block.level] || hClasses[2], block.text);
                            break;

                        case 'text':
                            el = createElement('p', 'text-base sm:text-lg text-gray-600 leading-relaxed', block.text);
                            break;

                        case 'image':
                            el = createElement('figure', 'my-6');
                            const imgContainer = createElement('div', 'rounded-xl overflow-hidden shadow-lg border border-gray-100 bg-gray-100');
                            const img = document.createElement('img');
                            img.className = 'w-full h-auto object-cover max-h-[600px] hover:scale-105 transition-transform duration-500';
                            img.src = block.url;
                            img.alt = block.alt || 'Image';
                            img.onerror = () => { img.src = 'https://via.placeholder.com/800x400?text=Image+Not+Found'; };
                            imgContainer.appendChild(img);
                            el.appendChild(imgContainer);
                            if (block.caption) el.appendChild(createElement('figcaption', 'text-sm text-center text-gray-500 mt-3 italic', block.caption));
                            break;

                        case 'link':
                            el = document.createElement('a');
                            el.className = block.style === 'button' 
                                ? 'inline-flex items-center justify-center bg-gray-900 hover:bg-gray-800 text-white font-medium py-3 px-6 rounded-lg transition-colors duration-200 shadow-sm w-full sm:w-auto text-center'
                                : 'text-blue-600 hover:text-blue-800 underline decoration-blue-300 underline-offset-4 transition-colors duration-200 font-medium';
                            el.textContent = block.text;
                            el.href = block.url;
                            if (block.openInNewTab) el.target = '_blank';
                            break;

                        case 'code':
                            el = createElement('div', 'rounded-xl overflow-hidden shadow-md my-6 bg-[#2d2d2d]');
                            const topBar = createElement('div', 'flex items-center justify-between px-4 py-2 bg-[#1e1e1e] border-b border-gray-700');
                            topBar.appendChild(createElement('span', 'text-xs text-gray-400 font-mono uppercase tracking-wider', block.language));
                            el.appendChild(topBar);
                            const pre = createElement('pre', `language-${block.language} p-4 overflow-x-auto text-sm`);
                            const code = createElement('code', `language-${block.language}`);
                            code.textContent = block.content;
                            pre.appendChild(code);
                            el.appendChild(pre);
                            break;

                        case 'table':
                            el = createElement('div', 'overflow-x-auto no-scrollbar rounded-xl shadow-sm border border-gray-200 my-6');
                            const table = createElement('table', 'min-w-full divide-y divide-gray-200');
                            const thead = createElement('thead', 'bg-gray-50');
                            const headerRow = document.createElement('tr');
                            block.headers.forEach(hText => headerRow.appendChild(createElement('th', 'px-6 py-3.5 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider', hText)));
                            thead.appendChild(headerRow);
                            table.appendChild(thead);

                            const tbody = createElement('tbody', 'bg-white divide-y divide-gray-200');
                            block.rows.forEach(row => {
                                const tr = createElement('tr', 'hover:bg-blue-50/50 transition-colors');
                                row.forEach(cData => tr.appendChild(createElement('td', 'px-6 py-4 whitespace-nowrap text-sm text-gray-700', cData)));
                                tbody.appendChild(tr);
                            });
                            table.appendChild(tbody);
                            el.appendChild(table);
                            break;
                    }

                    if (el) {
                        el.classList.add('fade-in');
                        el.style.animationDelay = `${index * 0.08}s`;
                        container.appendChild(el);
                    }
                });
            }

            if (window.Prism) Prism.highlightAll();
            spinner.style.display = 'none';
        }

        function renderError(filename) {
            const container = document.getElementById('content-container');
            document.getElementById('site-title').textContent = "Error";
            container.innerHTML = `
                <div class="text-center py-16 fade-in">
                    <h2 class="mt-4 text-2xl font-bold text-gray-900">Content Not Found</h2>
                    <p class="mt-2 text-gray-500">Attempted to fetch: <code class="bg-gray-100 px-2 py-1 rounded text-red-500 font-mono text-sm">${filename}</code></p>
                    <p class="mt-4 text-sm text-gray-400">If you are opening this locally (file://), fetch will fail due to browser security policies. You must run a local server or host on GitHub Pages.</p>
                </div>
            `;
            document.getElementById('loading-spinner').style.display = 'none';
        }

        // ==========================================
        // 4. THE FETCH CALL (No mock data)
        // ==========================================
        async function init() {
            const targetFile = getJsonFilename();
            try {
                // Strictly dynamic fetch. 
                const response = await fetch(targetFile);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                renderPage(data);
            } catch (error) {
                console.error("Fetch failed:", error);
                renderError(targetFile);
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
